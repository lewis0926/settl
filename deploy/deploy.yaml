# Trend Radar — k3s deployment
#
# Prerequisites (run once):
#
#   1. GHCR image pull secret (replace <user> and <token>):
#      kubectl create secret docker-registry ghcr-secret \
#        --docker-server=ghcr.io \
#        --docker-username=<github-user> \
#        --docker-password=<github-pat> \
#        -n settl
#
#   2. Backend config secret (contains API keys — never commit this):
#      kubectl create secret generic backend-config \
#        --from-file=config.json=/path/to/your/config.json \
#        -n settl
#
# Deploy / upgrade:
#   ./deploy/deploy.sh [tag]
#
# Roll out a specific image SHA:
#   kubectl set image deployment backend=ghcr.io/lewishum/settl-main:<sha> -n settl

---
apiVersion: v1
kind: Namespace
metadata:
  name: settl
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: settl
  namespace: settl
  labels:
    app: settl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: settl
  template:
    metadata:
      labels:
        app: settl
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: settl
          image: ${IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: settl
  namespace: settl
spec:
  selector:
    app: settl
  ports:
    - port: 80
      targetPort: 80

# ── Ingress (Traefik — k3s default) ──────────────────────────────────────────

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: settl
  namespace: settl
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  tls:
    - hosts:
        - ${INGRESS_HOST}
  rules:
    - host: ${INGRESS_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: settl
                port:
                  number: 80
